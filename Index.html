<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technician Skill Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card { border: 1px solid #e2e8f0; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; background: white; }
    </style>
</head>
<body class="bg-gray-50 p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">TechTracker Admin</h1>
            <button onclick="resetData()" class="text-xs text-red-500 hover:underline">Reset All Data</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8" id="stats-container">
            </div>

        <section class="card shadow-sm">
            <h2 class="text-xl font-semibold mb-4">Add New Technician</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="tech-name" placeholder="Name" class="border p-2 rounded">
                <input type="text" id="tech-role" placeholder="Role (e.g. Technician)" class="border p-2 rounded">
                <input type="number" id="tech-capacity" placeholder="Rack Capacity" class="border p-2 rounded">
            </div>
            <button onclick="addTechnician()" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Add Technician</button>
        </section>

        <section>
            <h2 class="text-xl font-semibold mb-4">Technicians</h2>
            <div id="tech-list" class="space-y-4">
                </div>
        </section>
    </div>

    <script>
        // --- INITIAL DATA & SEEDING ---
        const DEFAULT_SKILLS = [
            "Configuring Switches", "Configuring Compute Trays", 
            "Replacing Servers / NV Switches", "Finding Logs When ADAM Is Not Working",
            "Following Procedure for Failure", "Following Procedure for Escalation"
        ];

        let state = JSON.parse(localStorage.getItem('techTrackerData')) || {
            technicians: [],
            skills: DEFAULT_SKILLS,
            goals: []
        };

        function save() {
            localStorage.setItem('techTrackerData', JSON.stringify(state));
            render();
        }

        function resetData() {
            if(confirm("Delete everything?")) {
                localStorage.clear();
                location.reload();
            }
        }

        // --- LOGIC ---
        function addTechnician() {
            const name = document.getElementById('tech-name').value;
            const role = document.getElementById('tech-role').value || "Technician";
            const cap = document.getElementById('tech-capacity').value || 1;

            if(!name) return alert("Name required");

            const newTech = {
                id: Date.now(),
                name,
                role,
                rack_capacity: parseInt(cap),
                proficiencies: [] // IDs of skills mastered
            };

            state.technicians.push(newTech);
            save();
            document.getElementById('tech-name').value = '';
        }

        function toggleSkill(techId, skillName) {
            const tech = state.technicians.find(t => t.id === techId);
            if (tech.proficiencies.includes(skillName)) {
                tech.proficiencies = tech.proficiencies.filter(s => s !== skillName);
            } else {
                tech.proficiencies.push(skillName);
            }
            save();
        }

        function deleteTech(id) {
            state.technicians = state.technicians.filter(t => t.id !== id);
            save();
        }

        // --- RENDERING ---
        function render() {
            const list = document.getElementById('tech-list');
            const stats = document.getElementById('stats-container');
            
            // Render Stats
            const totalCap = state.technicians.reduce((sum, t) => sum + t.rack_capacity, 0);
            stats.innerHTML = `
                <div class="bg-white p-4 rounded shadow-sm border-l-4 border-blue-500">
                    <p class="text-gray-500 text-sm">Total Technicians</p>
                    <p class="text-2xl font-bold">${state.technicians.length}</p>
                </div>
                <div class="bg-white p-4 rounded shadow-sm border-l-4 border-green-500">
                    <p class="text-gray-500 text-sm">Total Rack Capacity</p>
                    <p class="text-2xl font-bold">${totalCap}</p>
                </div>
                <div class="bg-white p-4 rounded shadow-sm border-l-4 border-purple-500">
                    <p class="text-gray-500 text-sm">Avg Skills</p>
                    <p class="text-2xl font-bold">${state.technicians.length ? (state.technicians.reduce((s, t) => s + t.proficiencies.length, 0) / state.technicians.length).toFixed(1) : 0}</p>
                </div>
            `;

            // Render Tech Cards
            list.innerHTML = state.technicians.map(tech => `
                <div class="card shadow-sm hover:shadow-md transition-shadow">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-lg font-bold text-blue-800">${tech.name}</h3>
                            <p class="text-sm text-gray-600">${tech.role} • Capacity: ${tech.rack_capacity}</p>
                        </div>
                        <button onclick="deleteTech(${tech.id})" class="text-red-400 hover:text-red-600">Delete</button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                        ${state.skills.map(skill => {
                            const isProf = tech.proficiencies.includes(skill);
                            return `
                                <label class="flex items-center space-x-2 text-sm cursor-pointer p-1 rounded hover:bg-gray-100">
                                    <input type="checkbox" ${isProf ? 'checked' : ''} onchange="toggleSkill(${tech.id}, '${skill}')">
                                    <span class="${isProf ? 'text-green-700 font-medium' : 'text-gray-500'}">${skill}</span>
                                </label>
                            `;
                        }).join('')}
                    </div>
                </div>
            `).join('');
        }

        // Initial Load
        render();
    </script>
</body>
</html>
